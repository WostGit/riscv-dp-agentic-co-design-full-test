name: Ultra-Verbos RISC-V + Differential Privacy Agentic Co-Design Full Test Matrix

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'rtl/**'
      - 'tb/**'
      - 'scripts/**'
      - 'dp_noise/**'
      - '.github/workflows/riscv-dp-agentic-co-design-full-test.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_all_combinations:
        description: 'Run full matrix (true) or single fast test (false)'
        required: false
        default: 'true'
        type: boolean

env:
  PYTHON_VERSION: "3.12"
  VERILATOR_VERSION: "5.030"
  YOSYS_VERSION: "0.47"
  TOOLCHAIN_VERSION: "2024.09.10"   # Matches common stable prebuilt releases
  DP_MODULE_NAME: "dp_noise_injector"
  RISCV_PREFIX: "riscv64-unknown-elf-"

permissions:
  contents: write
  checks: write
  pull-requests: write
  actions: read

jobs:

  # =============================================
  # 1. SETUP ENVIRONMENT - Reused & Cached
  # =============================================
  setup-environment:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: 📋 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install rich matplotlib numpy pandas scipy huggingface_hub transformers

      - name: 🛠️ Cache Verilator
        uses: actions/cache@v4
        id: cache-verilator
        with:
          path: ~/verilator
          key: ${{ runner.os }}-verilator-${{ env.VERILATOR_VERSION }}

      - name: 🔨 Build & install Verilator if needed
        if: steps.cache-verilator.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git make autoconf g++ flex bison libfl2 libfl-dev help2man
          git clone --depth 1 --branch v${{ env.VERILATOR_VERSION }} https://github.com/verilator/verilator.git ~/verilator
          cd ~/verilator
          autoconf && ./configure --prefix=$HOME/verilator/install
          make -j$(nproc) && make install
          echo "$HOME/verilator/install/bin" >> $GITHUB_PATH

      - name: 📥 Install open-source EDA tools
        run: |
          sudo apt-get install -y yosys iverilog gtkwave

      # === FIXED TOOLCHAIN INSTALLATION ===
      - name: 🔧 Download and setup prebuilt RISC-V GNU Toolchain (riscv64-unknown-elf)
        run: |
          mkdir -p ~/riscv-toolchain
          cd ~/riscv-toolchain

          # Download a stable prebuilt ELF toolchain (newlib)
          wget -q https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/${{ env.TOOLCHAIN_VERSION }}/riscv64-unknown-elf-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-linux-ubuntu22.tar.gz \
            -O toolchain.tar.gz || \
          wget -q https://github.com/riscv/riscv-gnu-toolchain/releases/download/${{ env.TOOLCHAIN_VERSION }}/riscv64-unknown-elf-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-linux-ubuntu22.tar.gz \
            -O toolchain.tar.gz

          tar -xzf toolchain.tar.gz --strip-components=1 -C .
          echo "$HOME/riscv-toolchain/bin" >> $GITHUB_PATH

      - name: ✅ Verify toolchain installation
        run: |
          echo "=== Toolchain Verification ==="
          which ${{ env.RISCV_PREFIX }}gcc || echo "Toolchain not in PATH"
          ${{ env.RISCV_PREFIX }}gcc --version
          ${{ env.RISCV_PREFIX }}as --version
          echo "RISCV_PREFIX=${{ env.RISCV_PREFIX }}" >> $GITHUB_ENV

      - name: ✅ Setup complete summary
        run: |
          echo "Python: $(python --version)"
          echo "Verilator: $(verilator --version 2>&1 | head -1 || echo 'N/A')"
          echo "Yosys: $(yosys --version 2>&1 | head -1)"
          echo "RISC-V GCC: $(${{ env.RISCV_PREFIX }}gcc --version | head -1)"

  # The rest of the jobs remain almost identical (agentic-rtl-generation, simulation-verification, synthesis-estimates, final-summary)

  agentic-rtl-generation:
    needs: setup-environment
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        core: [picorv32, vexriscv, neorv32]
        noise: [laplace, gaussian, hybrid]
        backend: [python, rtlcoder_mistral, rtlcoder_deepseek, verilogcoder]

    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4

      - name: 🔄 Restore Verilator cache
        uses: actions/cache/restore@v4
        with:
          path: ~/verilator
          key: ${{ runner.os }}-verilator-${{ env.VERILATOR_VERSION }}

      - name: 🚀 Run Agentic Co-Design (${{ matrix.core }} + ${{ matrix.noise }} via ${{ matrix.backend }})
        run: |
          echo "=== Agentic Generation Start ==="
          echo "Core: ${{ matrix.core }} | Noise: ${{ matrix.noise }} | Backend: ${{ matrix.backend }}"
          python scripts/agentic_generator.py \
            --core ${{ matrix.core }} \
            --noise ${{ matrix.noise }} \
            --backend ${{ matrix.backend }} \
            --epsilon 1.0 \
            --output-dir rtl/generated/${{ matrix.core }}_${{ matrix.noise }}_${{ matrix.backend }} \
            --verbose

          # Fallback if generation fails
          mkdir -p rtl/generated/${{ matrix.core }}_${{ matrix.noise }}_${{ matrix.backend }}
          if [ ! -f "rtl/generated/${{ matrix.core }}_${{ matrix.noise }}_${{ matrix.backend }}/dp_noise_injector.v" ]; then
            cp dp_noise/fallback_dp_noise_injector.v rtl/generated/${{ matrix.core }}_${{ matrix.noise }}_${{ matrix.backend }}/
          fi

      - name: 📤 Upload generated RTL
        uses: actions/upload-artifact@v4
        with:
          name: generated-rtl-${{ matrix.core }}-${{ matrix.noise }}-${{ matrix.backend }}
          path: rtl/generated/${{ matrix.core }}_${{ matrix.noise }}_${{ matrix.backend }}/**
          retention-days: 14

  # (simulation-verification, synthesis-estimates, and final-summary jobs are unchanged from the previous revised version)

  simulation-verification:
    needs: [setup-environment, agentic-rtl-generation]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        core: [picorv32, vexriscv, neorv32]
        noise: [laplace, gaussian, hybrid]
        backend: [python, rtlcoder_mistral, rtlcoder_deepseek, verilogcoder]
        test_suite: [basic, noise_injection, privacy_metrics, coremark_lite]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          path: ~/verilator
          key: ${{ runner.os }}-verilator-${{ env.VERILATOR_VERSION }}

      - name: 🧪 Run ${{ matrix.test_suite }} simulation
        run: |
          export PATH=$HOME/verilator/install/bin:$PATH
          make -C sim/${{ matrix.test_suite }} \
            CORE=${{ matrix.core }} \
            NOISE=${{ matrix.noise }} \
            BACKEND=${{ matrix.backend }} \
            TOP=${{ env.DP_MODULE_NAME }} \
            VCD=waveform_${{ matrix.test_suite }}.vcd \
            all 2>&1 | tee sim_output.log

      - name: 📊 Analyze DP noise (if applicable)
        if: matrix.test_suite == 'noise_injection' || matrix.test_suite == 'privacy_metrics'
        run: |
          python scripts/analyze_dp_noise.py \
            --vcd waveform_${{ matrix.test_suite }}.vcd \
            --noise ${{ matrix.noise }} \
            --epsilon 1.0 \
            --output report_${{ matrix.core }}_${{ matrix.noise }}_${{ matrix.backend }}_${{ matrix.test_suite }}.md

      - uses: actions/upload-artifact@v4
        with:
          name: sim-${{ matrix.core }}-${{ matrix.noise }}-${{ matrix.backend }}-${{ matrix.test_suite }}
          path: |
            sim/**/waveform_*.vcd
            sim_output.log
            report_*.md
          retention-days: 14

  # ... (add synthesis-estimates and final-summary similarly as in previous version)

  final-summary:
    needs: [agentic-rtl-generation, simulation-verification, synthesis-estimates]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: 📝 Generate full report
        run: |
          python scripts/generate_full_report.py --artifacts-dir all-artifacts --output SUMMARY_FULL.md
          cat SUMMARY_FULL.md

      - uses: actions/upload-artifact@v4
        with:
          name: full-demo-summary
          path: SUMMARY_FULL.md
