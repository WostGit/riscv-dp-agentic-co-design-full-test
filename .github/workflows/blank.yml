name: Ultra-Verbos RISC-V + Differential Privacy Agentic Co-Design Full Test Matrix

# Triggers: push/PR to relevant paths, or manual dispatch with parameters
on:
  push:
    branches: [ main, develop ]
    paths:
      - 'rtl/**'
      - 'tb/**'
      - 'scripts/**'
      - 'dp_noise/**'
      - '.github/workflows/riscv-dp-agentic-co-design-full-test.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_all_combinations:
        description: 'Run full matrix (true) or single fast test (false)'
        required: false
        default: 'true'
        type: boolean
      model_backend:
        description: 'Override agent backend (python / rtlcoder / verilogcoder)'
        required: false
        default: 'all'

# Environment variables used across jobs
env:
  PYTHON_VERSION: "3.12"
  VERILATOR_VERSION: "5.030"
  YOSYS_VERSION: "0.47"  # Available via apt on ubuntu-24.04
  RISCV_TOOLCHAIN_VERSION: "2024.09.10"
  DP_MODULE_NAME: "dp_noise_injector"
  MAX_JOB_TIMEOUT_MINUTES: 360  # Safety net

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  artifacts: write

jobs:

  # =============================================
  # 1. SETUP ENVIRONMENT - Reused & Cached
  # =============================================
  setup-environment:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: 📋 Checkout repository (full history for potential versioning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install Python dependencies (for agents, analysis, reporting)
        run: |
          python -m pip install --upgrade pip
          pip install rich matplotlib numpy pandas scipy huggingface_hub transformers langchain langgraph  # For agent orchestration

      - name: 🛠️ Cache Verilator build
        uses: actions/cache@v4
        id: cache-verilator
        with:
          path: ~/verilator
          key: ${{ runner.os }}-verilator-${{ env.VERILATOR_VERSION }}

      - name: 🔨 Build & install Verilator if cache miss
        if: steps.cache-verilator.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y git make autoconf g++ flex bison libfl2 libfl-dev help2man
          git clone --depth 1 --branch v${{ env.VERILATOR_VERSION }} https://github.com/verilator/verilator.git ~/verilator
          cd ~/verilator
          autoconf && ./configure --prefix=$HOME/verilator/install
          make -j$(nproc) && make install
          echo "$HOME/verilator/install/bin" >> $GITHUB_PATH

      - name: 📥 Install open-source EDA tools (Yosys, Icarus, GTKWave)
        run: |
          sudo apt-get install -y yosys iverilog gtkwave

      - name: 🔧 Install RISC-V GNU toolchain
        uses: riscv-collab/riscv-gnu-toolchain-action@v1
        with:
          riscv-gnu-toolchain-version: ${{ env.RISCV_TOOLCHAIN_VERSION }}

      - name: 📦 Cache pip packages and tool outputs
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/riscv-tools
          key: ${{ runner.os }}-tools-${{ hashFiles('**/requirements*.txt') }}

      - name: ✅ Setup complete - print environment summary
        run: |
          echo "=== Environment Summary ==="
          echo "Python: $(python --version)"
          echo "Verilator: $(verilator --version 2>&1 | head -1 || echo 'not in PATH yet')"
          echo "Yosys: $(yosys --version 2>&1 | head -1)"
          echo "RISC-V GCC: $(riscv64-unknown-elf-gcc --version | head -1)"

  # =============================================
  # 2. AGENTIC RTL GENERATION MATRIX
  # =============================================
  agentic-rtl-generation:
    needs: setup-environment
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        core: [picorv32, vexriscv, neorv32]
        noise: [laplace, gaussian, hybrid]
        backend: [python, rtlcoder_mistral, rtlcoder_deepseek, verilogcoder]
        include:
          - backend: python
            description: "Lightweight rule/template-based agent (fast baseline)"
          - backend: rtlcoder_mistral
            description: "RTLCoder-v1.1 (Mistral-based, HF)"
            model_id: "ishorn5/RTLCoder-v1.1"
          - backend: rtlcoder_deepseek
            description: "RTLCoder-Deepseek-v1.1 (best performance on VerilogEval)"
            model_id: "ishorn5/RTLCoder-Deepseek-v1.1"
          - backend: verilogcoder
            description: "NVIDIA VerilogCoder multi-agent (graph planning + AST tracing)"

    steps:
      - name: 📋 Checkout code
        uses: actions/checkout@v4

      - name: 🔄 Restore cached tools
        uses: actions/cache/restore@v4
        with:
          path: ~/verilator
          key: ${{ runner.os }}-verilator-${{ env.VERILATOR_VERSION }}
          fail-on-cache-miss: false

      - name: 🚀 Run Agentic Co-Design for ${{ matrix.core }} + ${{ matrix.noise }} using ${{ matrix.backend }}
        id: generation
        env:
          HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}  # Optional for gated models
        run: |
          echo "=== Starting Agentic Generation ==="
          echo "Core          : ${{ matrix.core }}"
          echo "Noise mechanism: ${{ matrix.noise }}"
          echo "Backend       : ${{ matrix.backend }}"
          echo "Model (if applicable): ${{ matrix.model_id || 'N/A' }}"

          python scripts/agentic_generator.py \
            --core ${{ matrix.core }} \
            --noise ${{ matrix.noise }} \
            --backend ${{ matrix.backend }} \
            --model ${{ matrix.model_id || '' }} \
            --epsilon 1.0 \
            --output-dir rtl/generated/${{ matrix.core }}_${{ matrix.noise }}_${{ matrix.backend }} \
            --verbose

          # Always generate a fallback simple module if agent fails
          if [ ! -f "rtl/generated/${{ matrix.core }}_${{ matrix.noise }}_${{ matrix.backend }}/dp_noise_injector.v" ]; then
            echo "⚠️ Agent failed - using fallback simple DP module"
            cp dp_noise/fallback_dp_noise_injector.v rtl/generated/${{ matrix.core }}_${{ matrix.noise }}_${{ matrix.backend }}/
          fi

      - name: 📤 Upload generated RTL + logs
        uses: actions/upload-artifact@v4
        with:
          name: generated-rtl-${{ matrix.core }}-${{ matrix.noise }}-${{ matrix.backend }}
          path: |
            rtl/generated/${{ matrix.core }}_${{ matrix.noise }}_${{ matrix.backend }}/**
            logs/agent_${{ matrix.core }}_${{ matrix.noise }}_${{ matrix.backend }}.log
          retention-days: 14

  # =============================================
  # 3. SIMULATION & VERIFICATION MATRIX
  # =============================================
  simulation-verification:
    needs: [setup-environment, agentic-rtl-generation]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        core: [picorv32, vexriscv, neorv32]
        noise: [laplace, gaussian, hybrid]
        backend: [python, rtlcoder_mistral, rtlcoder_deepseek, verilogcoder]
        test_suite: [basic, noise_injection, privacy_metrics, coremark_lite]

    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4

      - name: 🔄 Restore Verilator
        uses: actions/cache/restore@v4
        with:
          path: ~/verilator
          key: ${{ runner.os }}-verilator-${{ env.VERILATOR_VERSION }}

      - name: 🧪 Run ${{ matrix.test_suite }} simulation for ${{ matrix.core }} + ${{ matrix.noise }} (${{ matrix.backend }})
        run: |
          export PATH=$HOME/verilator/install/bin:$PATH
          make -C sim/${{ matrix.test_suite }} \
            CORE=${{ matrix.core }} \
            NOISE=${{ matrix.noise }} \
            BACKEND=${{ matrix.backend }} \
            TOP=${{ env.DP_MODULE_NAME }} \
            VCD=waveform_${{ matrix.test_suite }}.vcd \
            all 2>&1 | tee sim_output.log

      - name: 📊 Analyze noise & privacy metrics (when applicable)
        if: matrix.test_suite == 'noise_injection' || matrix.test_suite == 'privacy_metrics'
        run: |
          python scripts/analyze_dp_noise.py \
            --vcd waveform_${{ matrix.test_suite }}.vcd \
            --noise ${{ matrix.noise }} \
            --epsilon 1.0 \
            --output report_${{ matrix.core }}_${{ matrix.noise }}_${{ matrix.backend }}_${{ matrix.test_suite }}.md

      - name: 📤 Upload simulation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sim-${{ matrix.core }}-${{ matrix.noise }}-${{ matrix.backend }}-${{ matrix.test_suite }}
          path: |
            sim/**/waveform_*.vcd
            sim_output.log
            report_*.md
            test_results.json
          retention-days: 14

  # =============================================
  # 4. SYNTHESIS ESTIMATES
  # =============================================
  synthesis-estimates:
    needs: simulation-verification
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      matrix:
        core: [picorv32, vexriscv]
        noise: [laplace, gaussian]

    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4

      - name: 🔬 Synthesize with Yosys for area/gate estimates
        run: |
          yosys -p "
            read_verilog rtl/*.v rtl/generated/*_${{ matrix.core }}_${{ matrix.noise }}*/*.v;
            hierarchy -check;
            synth -top ${{ env.DP_MODULE_NAME }};
            stat;
            write_json synth_${{ matrix.core }}_${{ matrix.noise }}.json;
          " > yosys_${{ matrix.core }}_${{ matrix.noise }}.log 2>&1

          python scripts/parse_synthesis.py \
            --input synth_${{ matrix.core }}_${{ matrix.noise }}.json \
            --output synthesis_report_${{ matrix.core }}_${{ matrix.noise }}.md

      - name: 📤 Upload synthesis results
        uses: actions/upload-artifact@v4
        with:
          name: synthesis-${{ matrix.core }}-${{ matrix.noise }}
          path: |
            synth_*.json
            yosys_*.log
            synthesis_report_*.md

  # =============================================
  # 5. FINAL SUMMARY & REPORT
  # =============================================
  final-summary:
    needs: [agentic-rtl-generation, simulation-verification, synthesis-estimates]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: 📝 Generate comprehensive Markdown summary
        run: |
          python scripts/generate_full_report.py \
            --artifacts-dir all-artifacts \
            --output SUMMARY_FULL.md \
            --include-failures

          cat SUMMARY_FULL.md

      - name: 📤 Upload final report
        uses: actions/upload-artifact@v4
        with:
          name: full-demo-summary
          path: SUMMARY_FULL.md

      - name: 💬 Comment summary on PR (if this is a PR)
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            🎉 **RISC-V + DP Agentic Co-Design Full Matrix Test Completed!**

            Tested combinations:
            - Cores: PicoRV32, VexRiscv, NEORV32
            - Noise: Laplace, Gaussian, Hybrid
            - Backends: Python baseline, RTLCoder (2 variants), VerilogCoder

            Check the `full-demo-summary` artifact for pass/fail rates, noise quality, area estimates, and waveforms.
            This demonstrates the current state of **open** agentic hardware co-design in CI.
